{% extends "base.html" %}
{% block title %}Create Account — Liberty Basketball{% endblock %}
{% block content %}
<div style="max-width:420px;margin:40px auto;">
  <div class="card" style="padding:32px;">
    <div style="text-align:center;margin-bottom:24px;">
      <img src="/static/img/patriot-logo.jpg" alt="Liberty Patriots" style="height:48px;margin-bottom:12px;">
      <h2 style="font-size:1.3rem;">Create Account</h2>
      <p class="text-muted" style="font-size:0.85rem;">Join Liberty Basketball</p>
    </div>

    <form method="post" action="{{ url_for('users.register') }}">
      <div class="form-group">
        <label for="display_name">Full Name *</label>
        <input class="form-control" type="text" id="display_name" name="display_name" placeholder="John Smith" required>
      </div>
      <div class="form-group">
        <label for="email">Email *</label>
        <input class="form-control" type="email" id="email" name="email" placeholder="you@email.com" required>
      </div>
      <div class="form-group">
        <label for="role">Role *</label>
        <select class="form-control" id="role" name="role">
          {% for value, label in roles %}
          <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label for="password">Password *</label>
          <input class="form-control" type="password" id="password" name="password" placeholder="Min 8 chars" required>
        </div>
        <div class="form-group">
          <label for="password2">Confirm *</label>
          <input class="form-control" type="password" id="password2" name="password2" placeholder="Repeat" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Create Account</button>
    </form>

    <div style="text-align:center;margin-top:16px;font-size:0.85rem;">
      <span class="text-muted">Already have an account?</span>
      <a href="{{ url_for('users.login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
