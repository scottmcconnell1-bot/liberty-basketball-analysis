{% extends "base.html" %}
{% block title %}Login — Liberty Basketball{% endblock %}
{% block content %}
<div style="max-width:420px;margin:60px auto;">
  <div class="card" style="padding:32px;">
    <div style="text-align:center;margin-bottom:24px;">
      <img src="/static/img/patriot-logo.jpg" alt="Liberty Patriots" style="height:48px;margin-bottom:12px;">
      <h2 style="font-size:1.3rem;">Liberty Basketball</h2>
      <p class="text-muted" style="font-size:0.85rem;">Sign in to your account</p>
    </div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('users.login') }}">
      <div class="form-group">
        <label for="email">Email</label>
        <input class="form-control" type="email" id="email" name="email" placeholder="you@email.com" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input class="form-control" type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Sign In</button>
    </form>

    <div style="text-align:center;margin-top:16px;font-size:0.85rem;">
      <span class="text-muted">Don't have an account?</span>
      <a href="{{ url_for('users.register') }}">Create one</a>
    </div>
  </div>
</div>
{% endblock %}
