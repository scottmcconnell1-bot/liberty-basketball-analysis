<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Liberty Basketball{% endblock %}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --color-primary:   #01696f;
      --color-primary-d: #015558;
      --color-bg:        #f7f6f2;
      --color-surface:   #ffffff;
      --color-border:    #e2e0da;
      --color-text:      #1a1a1a;
      --color-muted:     #6b7280;
      --color-success:   #059669;
      --color-danger:    #dc2626;
      --radius:          8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
    }

    /* ── Nav ───────────────────────────── */
    nav {
      background: var(--color-primary);
      padding: 0 24px;
      display: flex;
      align-items: center;
      height: 56px;
      gap: 32px;
    }

    nav .brand {
      color: #fff;
      font-weight: 700;
      font-size: 1.1rem;
      text-decoration: none;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    nav a {
      color: rgba(255,255,255,0.82);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      padding: 4px 8px;
      border-radius: var(--radius);
      transition: background 0.15s, color 0.15s;
    }

    nav a:hover, nav a.active {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    /* ── Main layout ────────────────────── */
    main {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 20px;
    }

    /* ── Card ───────────────────────────── */
    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 20px;
    }

    /* ── Buttons ────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: background 0.15s;
    }

    .btn-primary { background: var(--color-primary); color: #fff; }
    .btn-primary:hover { background: var(--color-primary-d); }

    .btn-secondary { background: var(--color-border); color: var(--color-text); }
    .btn-secondary:hover { background: #d0cec8; }

    .btn-danger { background: var(--color-danger); color: #fff; }
    .btn-danger:hover { background: #b91c1c; }

    .btn-sm { padding: 5px 10px; font-size: 0.8rem; }

    /* ── Forms ──────────────────────────── */
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.82rem; font-weight: 500; margin-bottom: 4px; color: var(--color-muted); }
    .form-control {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      font-size: 0.88rem;
      background: var(--color-bg);
      color: var(--color-text);
    }
    .form-control:focus { outline: none; border-color: var(--color-primary); }

    /* ── Table ──────────────────────────── */
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    thead th { padding: 10px 12px; text-align: left; font-size: 0.78rem; font-weight: 600; color: var(--color-muted); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--color-border); }
    tbody td { padding: 11px 12px; border-bottom: 1px solid var(--color-border); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: rgba(1,105,111,0.04); }

    /* ── Modal ──────────────────────────── */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--color-surface);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h3 { font-size: 1rem; font-weight: 600; margin-bottom: 18px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }

    /* ── Stat boxes ─────────────────────── */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 16px; }
    .stat-box { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius); padding: 18px 20px; }
    .stat-box .label { font-size: 0.78rem; color: var(--color-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .stat-box .value { font-size: 2rem; font-weight: 700; color: var(--color-primary); }

    /* ── Badge ──────────────────────────── */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.74rem; font-weight: 600; }
    .badge-home { background: #dcfce7; color: #166534; }
    .badge-away { background: #dbeafe; color: #1e40af; }
    .badge-tournament { background: #fef9c3; color: #854d0e; }
    .badge-win  { background: #dcfce7; color: #166534; }
    .badge-loss { background: #fee2e2; color: #991b1b; }
    .badge-scheduled { background: #f3f4f6; color: #4b5563; }

    /* ── Utility ────────────────────────── */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .page-header h2 { font-size: 1.25rem; font-weight: 700; }
    .text-muted { color: var(--color-muted); font-size: 0.85rem; }
    .mt-2 { margin-top: 8px; }
    .mt-4 { margin-top: 16px; }
    .alert { padding: 10px 14px; border-radius: var(--radius); font-size: 0.875rem; margin-bottom: 14px; }
    .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .alert-success { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a href="/" class="brand">🏀 Liberty Basketball</a>
    <a href="/" {% if request.endpoint == 'index' %}class="active"{% endif %}>Dashboard</a>
    <a href="/schedule" {% if request.endpoint == 'schedule' %}class="active"{% endif %}>Schedule</a>
    <a href="/videos" {% if request.endpoint == 'videos_page' %}class="active"{% endif %}>Videos</a>
    <a href="/status" {% if request.endpoint == 'status_page' %}class="active"{% endif %}>Status</a>
    <a href="/film" {% if request.endpoint == 'film' %}class="active"{% endif %}>Film Tool</a>
    <a href="/games" {% if request.endpoint == 'games_page' %}class="active"{% endif %}>Games</a>
    <a href="/nfhs-matches" {% if request.endpoint == 'nfhs_matches_page' %}class="active"{% endif %}>NFHS Matches</a>
    <a href="/users" {% if request.endpoint == 'users_page' %}class="active"{% endif %}>Users</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
