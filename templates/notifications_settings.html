{% extends "base.html" %}
{% block title %}Notification Settings — Liberty Basketball{% endblock %}
{% block content %}
<div style="max-width:600px;margin:0 auto;">
  <div class="page-header">
    <h2>🔔 Notification Preferences</h2>
  </div>

  <div class="card">
    <form method="post" action="{{ url_for('users.settings_notifications') }}">
      <h3 style="margin-bottom:12px;">Email Notifications</h3>
      <div style="margin-bottom:16px;">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:8px;">
          <input type="checkbox" name="notify_email_messages" {% if prefs and prefs.notify_email_messages %}checked{% endif %}>
          <span>New messages</span>
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:8px;">
          <input type="checkbox" name="notify_email_schedule" {% if prefs and prefs.notify_email_schedule %}checked{% endif %}>
          <span>Schedule changes</span>
        </label>
      </div>

      <h3 style="margin-bottom:12px;">Browser Push Notifications</h3>
      <div style="margin-bottom:16px;">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:8px;">
          <input type="checkbox" name="notify_push_messages" {% if prefs and prefs.notify_push_messages %}checked{% endif %}>
          <span>New messages</span>
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:8px;">
          <input type="checkbox" name="notify_push_schedule" {% if prefs and prefs.notify_push_schedule %}checked{% endif %}>
          <span>Schedule changes</span>
        </label>
        <button type="button" class="btn btn-sm btn-secondary" id="btn-enable-push" onclick="enablePushNotifications()" style="margin-top:8px;">Enable Browser Notifications</button>
        <div id="push-status" style="font-size:0.75rem;color:#6b7280;margin-top:4px;"></div>
      </div>

      <h3 style="margin-bottom:12px;">Quiet Hours</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
        <div class="form-group">
          <label for="quiet_hours_start">Start</label>
          <input class="form-control" type="time" id="quiet_hours_start" name="quiet_hours_start" value="{{ prefs.quiet_hours_start or '' }}">
        </div>
        <div class="form-group">
          <label for="quiet_hours_end">End</label>
          <input class="form-control" type="time" id="quiet_hours_end" name="quiet_hours_end" value="{{ prefs.quiet_hours_end or '' }}">
        </div>
      </div>

      <button type="submit" class="btn btn-primary">Save Preferences</button>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function enablePushNotifications() {
  const status = document.getElementById('push-status');
  if (!('Notification' in window)) {
    status.textContent = '❌ Browser notifications not supported';
    return;
  }
  if (!('serviceWorker' in navigator)) {
    status.textContent = '❌ Service workers not supported';
    return;
  }

  Notification.requestPermission().then(permission => {
    if (permission === 'granted') {
      status.textContent = '✅ Notifications enabled!';
      // Register service worker for push
      navigator.serviceWorker.register('/sw.js').then(reg => {
        return reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: '', // VAPID public key would go here
        });
      }).then(sub => {
        fetch('/api/push/subscribe', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(sub.toJSON()),
        });
      }).catch(() => {});
    } else {
      status.textContent = '❌ Permission denied';
    }
  });
}
</script>
{% endblock %}
