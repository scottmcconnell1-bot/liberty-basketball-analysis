{% extends "base.html" %}
{% block title %}Dashboard – Liberty Basketball{% endblock %}

{% block content %}
<div class="page-header">
  <h2>Dashboard</h2>
  <span class="text-muted" id="season-label">Loading…</span>
</div>

<!-- ── Team Sections (1.1) ─────────────────────────────────── -->
<div data-frame="1.1" id="team-sections">
  <div class="team-grid" id="team-grid"></div>
</div>

<div class="card mt-4" data-frame="1.2">
  <div class="page-header" style="margin-bottom:14px">
    <strong>Team Photos</strong>
  </div>
  <div id="team-photos-grid" class="team-photos-grid">
    <div class="text-muted">Loading…</div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  /** Format a date string to "Wed 4 Nov 25 7:00pm"
   * Accepts "Wed, 04 Nov 2026 00:00:00 GMT" or "2026-11-04" + time "19:00"
   */
  function formatGameDate(dateStr, timeStr) {
    if (!dateStr) return 'TBD';
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    let d, m, y, dayName;

    // Try "Wed, 04 Nov 2026 00:00:00 GMT" format
    const rfcMatch = dateStr.match(/^(\w+),\s+(\d{1,2})\s+(\w+)\s+(\d{4})/);
    if (rfcMatch) {
      dayName = rfcMatch[1].substring(0, 3);
      d = parseInt(rfcMatch[2], 10);
      m = rfcMatch[3].substring(0, 3);
      y = rfcMatch[4].substring(2); // last 2 digits
    } else {
      // Try "2026-11-04" format
      const parts = dateStr.split('-');
      if (parts.length >= 3) {
        const monthIdx = parseInt(parts[1], 10) - 1;
        d = parseInt(parts[2], 10);
        m = months[monthIdx] || '';
        y = parts[0].substring(2);
        // Compute day of week
        const dt = new Date(parts[0], monthIdx, d);
        dayName = days[dt.getDay()];
      } else {
        return dateStr;
      }
    }

    // Parse time
    let timePart = '';
    if (timeStr) {
      const tp = timeStr.split(':');
      if (tp.length >= 2) {
        let h = parseInt(tp[0], 10);
        const min = tp[1].padStart(2, '0');
        const ampm = h >= 12 ? 'pm' : 'am';
        if (h === 0) h = 12;
        else if (h > 12) h -= 12;
        timePart = ` ${h}:${min}${ampm}`;
      }
    }

    return `${dayName} ${d} ${m} ${y}${timePart}`;
  }

  async function load() {
    // ── Team Photos (1.2) ──────────────────────────────────
    const photosGrid = document.getElementById('team-photos-grid');

    async function loadPhotos() {
      try {
        const pr = await fetch('/api/teams/photos');
        const photos = await pr.json();
        const allKeys = [
          'varsity_boys','varsity_girls','jv_boys','jv_girls','jr_high_boys','jr_high_girls'
        ];
        const labels = {
          varsity_boys:'Varsity Boys', varsity_girls:'Varsity Girls',
          jv_boys:'JV Boys', jv_girls:'JV Girls',
          jr_high_boys:'Jr High Boys', jr_high_girls:'Jr High Girls'
        };

        let html = '';
        for (const key of allKeys) {
          const teamPhotos = photos[key] || [];
          html += `<div class="team-photo-section" data-team="${key}">`;
          html += `<div class="team-photo-header"><span class="team-photo-label">${labels[key]}</span>`;
          html += `<label class="btn btn-sm btn-secondary photo-upload-btn">📷 Upload<input type="file" accept="image/*" style="display:none" onchange="uploadPhoto('${key}',this)"></label>`;
          html += `</div>`;
          html += `<div class="team-photo-strip" id="photo-strip-${key}">`;
          if (teamPhotos.length === 0) {
            html += `<div class="no-photos">No photos yet</div>`;
          } else {
            for (const p of teamPhotos) {
              const url = `/uploads/team_photos/${encodeURIComponent(p.filename)}`;
              html += `<div class="photo-thumb" data-photo-id="${p.id}">`;
              html += `<img src="${url}" alt="${p.original_name}" loading="lazy" onclick="window.open('_blank').document.write('<img src=\\'${url}\\' style=\\'max-width:100%;max-height:100vh;margin:auto;display:block\\'>');">`;
              if (p.caption) html += `<div class="photo-caption">${p.caption}</div>`;
              html += `<div class="photo-actions">`;
              html += `<a href="${url}" download="${p.original_name}" class="btn btn-sm btn-secondary" title="Download">⬇</a>`;
              html += `<button class="btn btn-sm btn-danger" onclick="deletePhoto(${p.id},'${key}')" title="Delete">✕</button>`;
              html += `</div></div>`;
            }
          }
          html += `</div></div>`;
        }
        photosGrid.innerHTML = html;
      } catch(e) {
        photosGrid.innerHTML = '<div class="text-muted">Error loading photos</div>';
      }
    }

    await loadPhotos();

    // ── Team sections ──────────────────────────────────────
    const tr = await fetch('/api/teams/schedule');
    const teams = await tr.json();

    // Load rankings
    let rankings = {};
    try {
      const rr = await fetch('/api/teams/rankings');
      const rd = await rr.json();
      rankings = rd.rankings || {};
    } catch(e) { /* rankings optional */ }

    const grid = document.getElementById('team-grid');
    grid.innerHTML = teams.map(t => {
      const isVarsity = t.key === 'varsity_boys' || t.key === 'varsity_girls';
      const rankData = rankings[t.key] || {};
      const rankNum = rankData.ranking;
      const rankUrl = rankData.ranking_url || '#';
      const rankDate = rankData.scraped_at ? new Date(rankData.scraped_at).toLocaleDateString() : null;

      // Record display: Overall | Conference
      const overall = `${t.wins}-${t.losses}`;
      const conf = (t.conf_wins + t.conf_losses) > 0 ? `${t.conf_wins}-${t.conf_losses}` : '0-0';

      // Ranking badge (varsity only)
      let rankHtml = '';
      if (isVarsity) {
        const rankBadge = rankNum ? `<span class="team-rank">${rankNum}</span>` : `<span class="team-rank rank-na">Not Ranked</span>`;
        const rankDateHtml = rankDate ? `<span class="rank-date">Updated ${rankDate}</span>` : '<span class="rank-date">Never updated</span>';
        rankHtml = `
          <div class="team-ranking">
            <div class="rank-row">
              ${rankBadge}
              <a href="${rankUrl}" target="_blank" class="rank-link" title="View on MaxPreps">ⓘ</a>
              <button class="btn btn-sm rank-update-btn" onclick="updateRanking('${t.key}')" title="Check latest ranking">↻ Update</button>
            </div>
            ${rankDateHtml}
          </div>`;
      } else {
        // Non-varsity: empty placeholder to keep card heights consistent
        rankHtml = `<div class="team-ranking team-ranking-empty"></div>`;
      }

      // Last game
      let lastGameHtml = '';
      if (t.last_game) {
        const lg = t.last_game;
        const resClass = lg.result === 'win' ? 'result-win' : (lg.result === 'loss' ? 'result-loss' : '');
        const score = (lg.home_score != null && lg.away_score != null) ? ` (${lg.home_score}-${lg.away_score})` : '';
        lastGameHtml = `<div class="last-game">Last: <span class="${resClass}">${lg.result?.toUpperCase() ?? '–'}</span> vs ${lg.opponent_name}${score}</div>`;
      } else {
        lastGameHtml = `<div class="last-game">No games played yet</div>`;
      }

      // Upcoming: simplified Date | Opponent | H/A
      let scheduleHtml = '<div class="schedule-label">Upcoming</div>';
      if (t.upcoming.length === 0) {
        scheduleHtml += '<div class="no-games">No upcoming games</div>';
      } else {
        scheduleHtml += '<table class="schedule-table"><thead><tr><th>Date</th><th>Opponent</th><th></th></tr></thead><tbody>';
        scheduleHtml += t.upcoming.map(g => {
          const loc = g.location_type || 'home';
          const locLabel = loc === 'home' ? 'H' : (loc === 'away' ? 'A' : 'T');
          const locClass = loc === 'home' ? 'loc-home' : (loc === 'away' ? 'loc-away' : 'loc-tournament');
          const shortDate = formatGameDate(g.game_date, g.game_time);
          return `<tr><td class="sched-date">${shortDate}</td><td class="sched-opp">${g.opponent_name}</td><td><span class="loc-badge ${locClass}">${locLabel}</span></td></tr>`;
        }).join('');
        scheduleHtml += '</tbody></table>';
      }

      return `<div class="team-card" data-frame="1.1-${t.key}">
        <div class="team-card-top">
          <div class="team-name">${t.label}</div>
          ${rankHtml}
        </div>
        <div class="team-records">
          <div class="record-block"><span class="record-label">Overall</span><span class="record-val">${overall}</span></div>
          <div class="record-block"><span class="record-label">Conference</span><span class="record-val">${conf}</span></div>
        </div>
        ${lastGameHtml}
        ${scheduleHtml}
      </div>`;
    }).join('');
    if (window.libertyProcessFrameLabels) window.libertyProcessFrameLabels();

    // Auto-refresh rankings status
    window._rankingsLoaded = true;
  }

  async function updateRanking(teamKey) {
    const btn = document.querySelector(`[data-frame="1.1-${teamKey}"] .rank-update-btn`);
    if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
    try {
      const fd = new FormData();
      fd.append('state', 'Idaho');
      const r = await fetch('/api/teams/rankings', { method: 'POST', body: fd });
      const d = await r.json();
      const rk = d.rankings[teamKey];
      if (rk && rk.ranking) {
        // Update the ranking display without full reload
        const card = document.querySelector(`[data-frame="1.1-${teamKey}"]`);
        if (card) {
          const rankBadge = card.querySelector('.team-rank');
          if (rankBadge) {
            rankBadge.textContent = '#' + rk.ranking;
            rankBadge.classList.remove('rank-na');
          }
          const rankDate = card.querySelector('.rank-date');
          if (rankDate) rankDate.textContent = 'Updated just now';
          const rankLink = card.querySelector('.rank-link');
          if (rankLink && rk.ranking_url) rankLink.href = rk.ranking_url;
        }
      }
    } catch(e) {
      alert('Failed to update ranking. Please try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = '↻ Update';
    }
  }

  async function uploadPhoto(teamKey, input) {
    const file = input.files[0];
    if (!file) return;
    const caption = prompt('Add a caption (optional):', '') || '';
    const fd = new FormData();
    fd.append('file', file);
    fd.append('team_key', teamKey);
    fd.append('caption', caption);
    try {
      const r = await fetch('/api/teams/photos/upload', { method: 'POST', body: fd });
      if (!r.ok) { const e = await r.json(); alert(e.error || 'Upload failed'); return; }
      input.value = '';
      await load();
    } catch(e) {
      alert('Upload failed: ' + e.message);
    }
  }

  async function deletePhoto(photoId, teamKey) {
    if (!confirm('Delete this photo?')) return;
    try {
      const r = await fetch(`/api/teams/photos/${photoId}`, { method: 'DELETE' });
      if (!r.ok) { alert('Delete failed'); return; }
      await load();
    } catch(e) {
      alert('Delete failed: ' + e.message);
    }
  }

  load();
</script>
{% endblock %}
