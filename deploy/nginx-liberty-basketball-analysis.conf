# Nginx reverse proxy for Liberty Basketball Analysis
# Place this in /etc/nginx/sites-available/liberty-basketball-analysis
# Then: ln -s /etc/nginx/sites-available/liberty-basketball-analysis /etc/nginx/sites-enabled/
# Test: nginx -t
# Reload: systemctl reload nginx

server {
    listen 80;
    server_name _;  # Replace with your domain

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Max upload size for video files
    client_max_body_size 500M;

    # Static files (uploads)
    location /uploads/ {
        alias /opt/liberty-basketball-analysis/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy to gunicorn
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }
}
